<?xml version="1.0" encoding="UTF-8"?>
<!-- HEAVEN'S ON FIRE · mound-slot thumbnail — shorter pastel sunrise -->
<svg xmlns="http://www.w3.org/2000/svg" width="260" height="100" viewBox="0 0 260 100" preserveAspectRatio="xMidYMid slice">

    <defs>
        <linearGradient id="moundSky" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stop-color="#f4ebe0"/>
            <stop offset="50%" stop-color="#f5d3c0"/>
            <stop offset="100%" stop-color="#e8b8c0"/>
        </linearGradient>
        <radialGradient id="moundSun" cx="50%" cy="65%" r="55%">
            <stop offset="0%"   stop-color="#ffe5c8" stop-opacity="0.95"/>
            <stop offset="50%"  stop-color="#ffcfa8" stop-opacity="0.45"/>
            <stop offset="100%" stop-color="#f0b893" stop-opacity="0"/>
        </radialGradient>
        <linearGradient id="moundFrame" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stop-color="#f0b893"/>
            <stop offset="100%" stop-color="#c5b3c8"/>
        </linearGradient>
    </defs>

    <rect width="260" height="100" fill="url(#moundSky)"/>
    <rect x="2" y="2" width="256" height="96" fill="none" stroke="url(#moundFrame)" stroke-width="1.2" opacity="0.55"/>

    <!-- Diffuse sun -->
    <circle cx="130" cy="62" r="50" fill="url(#moundSun)"/>
    <circle cx="130" cy="58" r="12" fill="#ffe5c8" opacity="0.85"/>

    <!-- Two small mound hills -->
    <g fill="#8a7090" opacity="0.65">
        <path d="M 0 88 Q 60 62 130 78 Q 200 62 260 88 L 260 100 L 0 100 Z"/>
    </g>
    <g fill="#5a4a6a" opacity="0.55">
        <path d="M 0 96 Q 80 78 130 88 Q 180 78 260 96 L 260 100 L 0 100 Z"/>
    </g>

    <!-- Sparse far-tree dots on the mound -->
    <g fill="#2a1d2a" opacity="0.65">
        <path d="M 70 78 L 70 70 L 72 72 L 70 66 L 73 68 Z"/>
        <path d="M 180 78 L 180 68 L 182 70 L 180 64 L 184 66 Z"/>
    </g>

    <!-- Tiny pastel orb sparkles -->
    <g>
        <circle cx="36"  cy="26" r="1.5" fill="#f0b893" opacity="0.85"/>
        <circle cx="224" cy="22" r="1.5" fill="#e5b8c4" opacity="0.85"/>
        <circle cx="100" cy="18" r="1.2" fill="#ffe5c8" opacity="0.95"/>
        <circle cx="170" cy="16" r="1.2" fill="#f0b893" opacity="0.85"/>
    </g>
</svg>
